name: Build Android APK (Fixed Signature)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        # Ensure we get ALL files including fixed-debug.keystore
        lfs: false

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - name: Verify keystore exists
      run: |
        ls -la fixed-debug.keystore
        keytool -list -keystore fixed-debug.keystore -storepass android -alias fixeddebug

    - name: Install Gradle via SDKMAN
      run: |
        curl -s "https://get.sdkman.io" | bash
        source "$HOME/.sdkman/bin/sdkman-init.sh"
        sdk install gradle 8.5
        gradle --version

    - name: Build APK with fixed signature
      run: |
        source "$HOME/.sdkman/bin/sdkman-init.sh"
        gradle assembleDebug --no-daemon \
          -Pandroid.injected.signing.store.file=$PWD/fixed-debug.keystore \
          -Pandroid.injected.signing.store.password=android \
          -Pandroid.injected.signing.key.alias=fixeddebug \
          -Pandroid.injected.signing.key.password=android

    - uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
