name: Build Android APK (Fixed Signature)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - name: Restore fixed keystore from cache
      uses: actions/cache@v4
      id: keystore-cache
      with:
        path: /home/runner/fixed-debug.keystore
        key: fixed-debug-keystore-v1

    - name: Generate fixed keystore if not cached
      if: steps.keystore-cache.outputs.cache-hit != 'true'
      run: |
        keytool -genkey -v \
          -keystore /home/runner/fixed-debug.keystore \
          -storepass android \
          -alias fixeddebug \
          -keypass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=Fixed Debug,OU=Dev,O=SMSGateway,L=Home,ST=CN,C=CN"
        echo "Generated new fixed keystore"

    - name: Install Gradle via SDKMAN
      run: |
        curl -s "https://get.sdkman.io" | bash
        source "$HOME/.sdkman/bin/sdkman-init.sh"
        sdk install gradle 8.5
        gradle --version

    - name: Build APK with fixed signature
      run: |
        source "$HOME/.sdkman/bin/sdkman-init.sh"
        gradle assembleDebug --no-daemon \
          -Pandroid.injected.signing.store.file=/home/runner/fixed-debug.keystore \
          -Pandroid.injected.signing.store.password=android \
          -Pandroid.injected.signing.key.alias=fixeddebug \
          -Pandroid.injected.signing.key.password=android

    - uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
